name: Build, Test & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:  # umožní ručně spustit z GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Build + test (běží pro každý push i PR)
  # ──────────────────────────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────
  # Deploy na VŠB server (jen pro push do master)
  # Běží na self-hosted runneru přímo na cílovém serveru.
  # ──────────────────────────────────────────────────────────────────────
  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: self-hosted

    steps:
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:latest"
          echo "==> Pulling $IMAGE"
          docker pull "$IMAGE"

      - name: Stop and remove old container
        run: |
          docker stop petrinet 2>/dev/null || true
          docker rm petrinet 2>/dev/null || true

      - name: Start new container
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:latest"
          mkdir -p /home/sig0061/petrinet-logs
          docker run -d \
            --name petrinet \
            --restart unless-stopped \
            --memory=4g \
            -p 8080:8080 \
            -v petrinet-keys:/app/dataprotection-keys \
            -v /home/sig0061/petrinet-logs:/app/logs \
            -e DP_KEYS_PATH=/app/dataprotection-keys \
            --log-driver=json-file \
            --log-opt max-size=50m \
            --log-opt max-file=5 \
            "$IMAGE"

      - name: Clean up old images
        run: docker image prune -af --filter "until=168h" || true

      - name: Show container status
        run: |
          echo "==> Container status:"
          docker ps --filter "name=petrinet"
          echo "==> Recent logs:"
          sleep 3
          docker logs --tail 20 petrinet
